defaults:
  - override hydra/launcher: submitit_slurm

version: '0.0.2'

seed: 0

experiment:
  design_rounds: 3
  refine_rounds: 0
  sbi_prior_samples: 1_000 
  sbi_train_steps: 1_000
  sbi_rounds: 3
  true_theta: [0.85, 0.85] # high k and epsilon values
  device: "cuda"      # Can only be "cpu" or "cuda"
  save_params: true
  save_name: "BMP_flow_params"
  hpc: True

wandb:
  use_wandb: True
  entity: vz_uci
  project: BMP_UAI_rebuttal2

baseline:
  design_policy: optimized      # optimized | random | sobol
  likelihood_objective: infonce_lambda  # infonce_lambda | nle
  early_stopping:
    enabled: true
    patience: 10
    scale: 1e-3

contrastive_sampling:
  M: 63 # Due to roling, this must be less than N
  N: 64

designs:
  d: null
  xi: null
  num_xi: 1
  norm_type: "log" # Only "inf" or "log"
  xi_mu: 500.
  xi_stddev: 300.
  design_dist: true

param_shapes:
  theta_shape: 2
  event_dim: 1

flow_params:
  num_layers: 5
  mlp_num_layers: 2
  mlp_hidden_size: 64
  num_bins: 8
  reset_flow: true
  activation: "gelu"

optimization_params:
  learning_rate: 1e-3
  xi_learning_rate: 1e-3
  xi_optimizer: "Adam"
  xi_scheduler: "Custom" # TODO: Add ReduceLROnPlateau scheduler
  flow_beta2: 0.999
  xi_beta2: 0.999        # value of 0.95 mitigates large gradient updates
  ewma_smoothing: 0.8
  coefficient: 1.0
  tau: 10.
  training_steps: 500
  refine_likelihood_rounds: 1000
  xi_lr_end: 5e-5
  decay_rate: 2.
  lr_values: [5e-2, 1e-2, 5e-3]
  restarts: 3
  eig_lambda: 0.05
  # TODO: try 1 for these
  flow_grad_clip: 100.0
  xi_grad_clip: 100.0
  end_sigma: 1.0
  importance_sampling: false
  dropout_rate: 0.2
  
post_optimization:
  steps: 100
  K: 1
  post_N: 256
  resnet: True
  lr: 1e-4
  vi_type: 'fKL' # only 'iwelbo' or 'fKL' or 'fKL_sbc'
  sbc_lam: 0.
  grad_clip: 5.0
  sbc_samples: 128
  sbc_lambda: 0.0
  num_adapt_steps: 1_000
  perform_sbc: false

mcmc:
  num_warmup_steps: 1_000
  target_ess: 0.25
  sbc_mcmc_samples: 1_000

xi_scheduler:
  patience: 20
  reduce_factor: 0.8
  min_improvement: 5e-3
  cooldown: 10

hydra:
  # run:
  sweep:
    # TODO: Check that xi dimensionality is preserved
    dir: ./data/${version}
    # ${'null' if not designs.d else designs.d}/${designs.xi}/${optimization_params.lambda_}/${lagrange_weight_sch.sigmoid_params.slope}/${contrastive_sampling.N}/${contrastive_sampling.M}/${now:%Y.%m.%d.%H.%M}
    # subdir: ${hydra.job.num}/${seed}
    subdir: ${hydra.job.override_dirname}
