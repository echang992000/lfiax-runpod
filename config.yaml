defaults:
  - override hydra/launcher: submitit_slurm

version: '0.0.1'

seed: 0

experiment:
  design_rounds: 1
  refine_rounds: 0
  sbi_prior_samples: 10  # Must be same shape as N in contrastive sampling
  sbi_train_steps: 10
  device: "cpu"      # Can only be "cpu" or "cuda"
  save_params: false
  save_name: "lin_model"
  hpc: false

wandb:
  use_wandb: true
  entity: vz_uci
  project: uai_2026_linear

contrastive_sampling:
  M: 50  # Note: due to rolling window, M must be less than N
  N: 10 # Note: Must be same shape as sbi_prior_samples

designs:
  d: null # [10.] # [-5., -2.5, 0., 2.5, 5., .1, .2, .3, .4, 0.01] #  # [0.] # 0. # null
  xi: null #  [-10., 10.] # [0.]
  num_xi: 1
  norm_type: "inf"
  scale_factor: 10.0
  df: 2.  # If using "student" the scale factor should be 11 or greater

param_shapes:
  theta_shape: 2
  event_dim: 1

flow_params:
  num_layers: 5
  mlp_num_layers: 4
  mlp_hidden_size: 128
  num_bins: 4

optimization_params:
  learning_rate: 1e-3
  xi_learning_rate: 1e-2
  xi_optimizer: "Adam"
  xi_scheduler: "None"
  training_steps: 10_000
  xi_lr_end: 1e-3
  lr_values: [5e-2, 1e-2, 5e-3]
  restarts: 3
  eig_lambda: 0.0


hydra:
  run:
    dir: ./data/${version}/${now:%Y.%m.%d.%H.%M}
  # sweep:
    # TODO: Check that xi dimensionality is preserved
    # dir: ./data/${version}
    # ${'null' if not designs.d else designs.d}/${designs.xi}/${optimization_params.lambda_}/${lagrange_weight_sch.sigmoid_params.slope}/${contrastive_sampling.N}/${contrastive_sampling.M}/${now:%Y.%m.%d.%H.%M}
    # subdir: ${hydra.job.num}/${seed}
    # subdir: ${hydra.job.override_dirname}
  launcher:
    max_num_timeout: 10
    timeout_min: 4
    partition: free
    account: eehui_lab
    # nodes: 1
    # array_parallelism: 5
    # ntasks: 1
    # cpus-per-task: 1
    # array: "1:5"
    # mail-type: "fail, end"
    # mail-user: "vzaballa@uci.edu"
    # comment: ICML
    # mem_gb: 64
    # gpus_per_node: 1
