defaults:
  - override hydra/launcher: submitit_slurm

version: '0.0.12'
version_description: 'dropout and reset flow params.'

seed: 0

experiment:
  design_rounds: 2
  refine_rounds: 0
  sbi_prior_samples: 1_000 # Assume this is larger than N in the code
  sbi_train_steps: 0  # this is really just the post-train modification
  sir_type: "8_0"    # Can only be "1_3", "3_0", or "8_0"
  device: "cpu"      # Can only be "cpu" or "cuda"
  save_params: True
  save_name: "test_sir"
  hpc: True
  debug: False

wandb:
  use_wandb: True
  entity: vz_uci
  project: sir_UAI_rebuttal2

baseline:
  design_policy: optimized      # optimized | random | sobol
  likelihood_objective: infonce_lambda  # infonce_lambda | nle
  early_stopping:
    enabled: true
    patience: 50
    scale: 1e-3

contrastive_sampling:
  M: 255  # Note: due to rolling window, M must be less than N
  N: 256 # Note: Must be same shape as sbi_prior_samples

designs:
  d: null # [10.] # [-5., -2.5, 0., 2.5, 5., .1, .2, .3, .4, 0.01] #  # [0.] # 0. # null
  xi: null #  [-10., 10.] # [0.]
  num_xi: 1 # should only ever be one :)
  norm_type: "log" # Only inf or log or ppf
  scale_factor: 12.0
  df: 2.  # If using "student" the scale factor should be 11 or greater
  xi_mu: 50.
  xi_stddev: 30.
  use_design_dist: True

param_shapes:
  theta_shape: 2
  event_dim: 1

flow_params:
  num_layers: 5
  mlp_num_layers: 2
  mlp_hidden_size: 128
  num_bins: 8
  resnet: True
  activation: "gelu"
  z_scale_theta: False
  dropout_rate: 0.2
  reset_flow: false

mcmc_params:
  num_adapt_steps: 1_000
  num_mcmc_samples: 1_000

# TODO: Make posterior yaml parameters
post_optimization:
  num_layers: 5
  mlp_num_layers: 2
  mlp_hidden_size: 64
  num_bins: 4
  resnet: True
  sbc_lam: 0.0  # maybe change
  sbc_samples: 128
  vi_steps: 200
  vi_samples: 512

optimization_params:
  learning_rate: 1e-3
  xi_learning_rate: 1e-3
  xi_optimizer: "Adam"
  xi_scheduler: "Custom"  # Only option is None, CosineDecay, or Custom
  flow_beta2: 0.999
  xi_beta2: 0.999        # This mitigates large gradient updates
  ewma_smoothing: 0.8
  coefficient: 1.0
  tau: 10.
  training_steps: 10_000
  refine_likelihood_rounds: 50
  xi_lr_end: 5e-5
  lr_values: [5e-2, 1e-2, 5e-3]
  restarts: 3
  eig_lambda: 1.
  grad_clip: 5.0
  xi_grad_clip: 5.0
  end_sigma: 0.1
  imp_sampling: false
  y_scale: 100.
  post_pre_train: True
  post_pre_train_steps: 100
  theta_0_resamples: 10001


xi_scheduler:
  patience: 200
  reduce_factor: 0.8
  min_improvement: 1e-1
  cooldown: 10


hydra:
  run:
    dir: ./data/${version}/${now:%Y.%m.%d.%H.%M}
